name: "E2E setup"
description: |
  geo-base の E2E テスト用環境セットアップ。
  Postgres / Redis services はワークフロー側で `services:` ブロックで指定する前提で、
  本 action は uv / Node / Playwright のキャッシュ復元と依存解決、
  geo_base_e2e DB スキーマの初期化、admin の create を担当する。

inputs:
  python-version:
    description: "Python version"
    required: false
    default: "3.11"
  node-version:
    description: "Node version"
    required: false
    default: "20"
  postgres-host:
    description: "Postgres host (services 経由なら 'localhost' でよい)"
    required: false
    default: "localhost"
  postgres-port:
    description: "Postgres port"
    required: false
    default: "5432"
  e2e-database-url:
    description: "E2E DB の DATABASE_URL"
    required: true
  worker-count:
    description: "並列ワーカー数（追加で geo_base_e2e_w0..w(N-1) を作る、デフォルト 1）"
    required: false
    default: "1"

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
        cache-dependency-glob: "api/uv.lock"

    - name: Install API dependencies
      shell: bash
      working-directory: api
      run: uv sync --extra dev

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"
        cache-dependency-path: app/package-lock.json

    - name: Install app dependencies
      shell: bash
      working-directory: app
      run: npm ci

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('app/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright browsers
      shell: bash
      working-directory: app
      run: npx playwright install --with-deps chromium

    - name: Initialize E2E DB schema
      shell: bash
      env:
        PGHOST: ${{ inputs.postgres-host }}
        PGPORT: ${{ inputs.postgres-port }}
        PGUSER: postgres
        PGPASSWORD: postgres
        E2E_DATABASE_URL: ${{ inputs.e2e-database-url }}
        E2E_WORKER_COUNT: ${{ inputs.worker-count }}
      run: |
        # メインの E2E DB 名を抽出。Phase 2 で worker 別 DB
        # (geo_base_e2e_w0 等) に拡張しても URL 入力を変えるだけで済む。
        DB_NAME=$(echo "$E2E_DATABASE_URL" | sed -E 's|^.*/([^/?]+)(\?.*)?$|\1|')
        if [ -z "$DB_NAME" ]; then
          echo "Failed to extract DB name from E2E_DATABASE_URL" >&2
          exit 1
        fi
        # 共通の init 対象: メイン DB + (worker 数 > 1 のとき) ワーカー DB。
        DBS=("$DB_NAME")
        if [ "$E2E_WORKER_COUNT" -gt 1 ]; then
          for i in $(seq 0 $((E2E_WORKER_COUNT - 1))); do
            DBS+=("geo_base_e2e_w${i}")
          done
        fi
        for DB in "${DBS[@]}"; do
          echo "Creating $DB"
          psql -d postgres -c "CREATE DATABASE \"$DB\";"
          for f in docker/postgis-init/0[1-6]_*.sql; do
            echo "Applying $f to $DB"
            psql -d "$DB" -v ON_ERROR_STOP=1 -f "$f"
          done
        done

    - name: Create E2E admin user
      shell: bash
      working-directory: api
      env:
        DATABASE_URL: ${{ inputs.e2e-database-url }}
        JWT_SECRET: ci-test-secret-not-for-production
      run: |
        uv run python -m lib.auth.cli create-admin \
          --email e2e-admin@example.com \
          --password 'E2E-pass-1!' \
          --name 'E2E Admin' || echo "Admin may already exist; continuing"

    - name: Build Next.js (production)
      shell: bash
      working-directory: app
      env:
        # NEXT_PUBLIC_API_URL は空のまま:
        # ブラウザは /api/* (相対) を叩き、Next.js の rewrites が
        # API_BACKEND_URL に reverse proxy する。これにより
        # HttpOnly refresh cookie がブラウザの localhost:3000 ドメインに保存される。
        API_BACKEND_URL: http://localhost:8000
      run: npm run build
